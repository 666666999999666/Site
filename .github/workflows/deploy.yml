name: Build and Deploy

on:
  push:
    branches: [main]

env:
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_IMAGE: ccr.ccs.tencentyun.com/qzsite/web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Tencent Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.TCR_IMAGE }}:latest
            ${{ env.TCR_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            cd ${{ secrets.SERVER_APP_DIR }}
            # 登录腾讯云 ACR（内网拉取免流量费）
            docker login ccr.ccs.tencentyun.com -u ${{ secrets.TCR_USERNAME }} -p ${{ secrets.TCR_PASSWORD }}
            # 拉取最新镜像（腾讯云内网，速度极快）
            docker compose pull web
            # 重启服务（数据库数据在 volume 中，不会丢失）
            docker compose up -d web
            # 清理旧镜像
            docker image prune -f
