name: Build and Deploy

on:
  push:
    branches:
      - main

env:
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_IMAGE: ccr.ccs.tencentyun.com/qzsite/web

stages:
  - name: build-and-push
    jobs:
      - name: docker-build-push
        displayName: Docker 构建并推送镜像到腾讯云 ACR
        runsOn: public/cn-east-2-docker
        env:
          TCR_USERNAME: ${{ gitee.TCR_USERNAME }}
          TCR_PASSWORD: ${{ gitee.TCR_PASSWORD }}
          TCR_REGISTRY: ${{ env.TCR_REGISTRY }}
          TCR_IMAGE: ${{ env.TCR_IMAGE }}
        step: build@docker
        dockerfilePath: ./Dockerfile
        dockerContext: .
        image:
          - ${{ env.TCR_IMAGE }}:latest
          - ${{ env.TCR_IMAGE }}:${{ gitee.sha }}
        registry: ${{ env.TCR_REGISTRY }}
        username: ${{ gitee.TCR_USERNAME }}
        password: ${{ gitee.TCR_PASSWORD }}

  - name: deploy
    dependsOn: build-and-push
    jobs:
      - name: ssh-deploy
        displayName: SSH 部署到腾讯云服务器
        runsOn: public/cn-east-2
        env:
          SERVER_HOST: ${{ gitee.SERVER_HOST }}
          SERVER_USER: ${{ gitee.SERVER_USER }}
          SERVER_SSH_KEY: ${{ gitee.SERVER_SSH_KEY }}
          SERVER_APP_DIR: ${{ gitee.SERVER_APP_DIR }}
          TCR_USERNAME: ${{ gitee.TCR_USERNAME }}
          TCR_PASSWORD: ${{ gitee.TCR_PASSWORD }}
          TCR_REGISTRY: ${{ env.TCR_REGISTRY }}
        steps:
          - name: deploy-via-ssh
            displayName: 拉取镜像并部署
            script: |
              # 配置 SSH 密钥
              mkdir -p ~/.ssh
              echo "${SERVER_SSH_KEY}" > ~/.ssh/deploy_key
              chmod 600 ~/.ssh/deploy_key
              ssh-keyscan -H ${SERVER_HOST} >> ~/.ssh/known_hosts 2>/dev/null

              # SSH 到服务器执行部署
              ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key ${SERVER_USER}@${SERVER_HOST} << 'DEPLOY'
                cd ${{ env.SERVER_APP_DIR }}
                # 登录腾讯云 ACR（内网拉取免流量费）
                docker login ccr.ccs.tencentyun.com -u ${TCR_USERNAME} -p ${TCR_PASSWORD}
                # 拉取最新镜像（腾讯云内网，速度极快）
                docker compose pull web
                # 重启服务（数据库数据在 volume 中，不会丢失）
                docker compose up -d web
                # 清理旧镜像
                docker image prune -f
              DEPLOY
