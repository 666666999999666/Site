name: build-and-deploy
displayName: 构建并部署

triggers:
  push:
    - matchType: PRECISE
      branch: main

variables:
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_IMAGE: ccr.ccs.tencentyun.com/qzsite/web

stages:
  - stage:
      name: build-stage
      displayName: Docker 镜像构建
      failFast: true
      trigger: auto
      steps:
        - step: build@docker
          name: build_docker
          displayName: 构建并推送镜像到腾讯云 ACR
          repository: ccr.ccs.tencentyun.com
          username: ${TCR_USERNAME}
          password: ${TCR_PASSWORD}
          tag: qzsite/web:latest,qzsite/web:${GITEE_PIPELINE_BUILD_NUMBER}
          dockerfile: ./Dockerfile
          isCache: true

  - stage:
      name: deploy-stage
      displayName: 部署到服务器
      failFast: true
      trigger: auto
      steps:
        - step: ssh@deploy
          name: ssh_deploy
          displayName: SSH 部署
          host: ${SERVER_HOST}
          user: ${SERVER_USER}
          privateKey: ${SERVER_SSH_KEY}
          commands:
            - cd ${SERVER_APP_DIR}
            - docker login ccr.ccs.tencentyun.com -u ${TCR_USERNAME} -p ${TCR_PASSWORD}
            - docker compose pull web
            - docker compose up -d web
            - docker image prune -f
