version: '1.0'
name: pipeline-deploy
displayName: 构建并部署
triggers:
  trigger: auto
  push:
    branches:
      precise:
        - main
variables:
  TCR_USERNAME: '100033514933'
  TCR_PASSWORD: dockerlqz123
stages:
  - name: build-stage
    displayName: Docker 镜像构建
    strategy: fast
    trigger: auto
    executor:
      - lqzzql
    steps:
      - step: build@docker
        name: build_docker
        displayName: 构建并推送镜像到腾讯云 ACR
        repository: ccr.ccs.tencentyun.com
        username: ${TCR_USERNAME}
        password: ${TCR_PASSWORD}
        tag: lqzzql/web:latest
        dockerfile: ./Dockerfile
        isCache: false

  - name: deploy-stage
    displayName: 部署到服务器
    strategy: fast
    trigger: auto
    executor:
      - lqzzql
    steps:
      - step: deploy@agent
        name: deploy_agent
        displayName: 主机部署
        hostGroupID: tencent-cloud
        script: |
          cd /home/ubuntu/个人网站
          docker login ccr.ccs.tencentyun.com -u ${TCR_USERNAME} -p ${TCR_PASSWORD}
          docker compose pull web
          docker compose up -d web
          docker image prune -f
